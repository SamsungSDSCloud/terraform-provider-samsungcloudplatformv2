name: Acceptance Tests (Scheduled)

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

concurrency:
  group: acctest-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: acctest-region-${{ matrix.region }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        region:
          - kr-west-1
    env:
      TF_ACC: '1'
      SCP_TF_DEFAULT_REGION: ${{ matrix.region }}
      SCP_TF_AUTH_URL: https://iam.samsungsdscloud.com/v1
      SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
      SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.11.*'
          terraform_wrapper: false

      - name: Sweep before tests
        run: go test ./... -v -sweep=${{ matrix.region }} -timeout 600m
        continue-on-error: true

      - name: Run acceptance tests
        run: go test -v -cover -timeout 600m ./...

      - name: Sweep after tests
        if: always()
        run: go test ./... -v -sweep=${{ matrix.region }} -timeout 600m
        continue-on-error: true

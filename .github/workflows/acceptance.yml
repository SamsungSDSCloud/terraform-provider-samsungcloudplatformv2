name: Acceptance Tests (Scheduled)
on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
concurrency:
  group: acctest-${{ github.workflow }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 630
    concurrency:
      group: acctest-region-${{ matrix.region }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        region:
          - kr-west1
    env:
      TF_ACC: '1'
      TF_LOG: DEBUG
      SCP_TF_DEFAULT_REGION: ${{ matrix.region }}
      SCP_TF_AUTH_URL: https://iam.e.samsungsdscloud.com/v1
      SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
      SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
      GOPRIVATE: github.com/SamsungSDSCloud/terraform-sdk-samsungcloudplatformv2
      GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
      GOFLAGS: -mod=mod
    steps:
      - uses: actions/checkout@v6
      - name: Unshallow
        run: git fetch --prune --unshallow
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Config Access Token
        run: git config --global url.https://$GH_ACCESS_TOKEN@github.com/.insteadOf https://github.com/
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.11.*'
          terraform_wrapper: false
      - name: Write SCP config files for sweeper
        env:
          SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
          SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
        run: |
          mkdir -p "$HOME/.scpconf"
          chmod 700 "$HOME/.scpconf"
          umask 077
          cat > "$HOME/.scpconf/credentials.json" <<EOF
          {
            "access-key": "${SCP_TF_ACCESS_KEY}",
            "secret-key": "${SCP_TF_SECRET_KEY}"
          }
          EOF
          cat > "$HOME/.scpconf/config.json" <<EOF
          {
            "auth-url": "${SCP_TF_AUTH_URL}",
            "default-region": "${SCP_TF_DEFAULT_REGION}"
          }
          EOF

      # sweep 대상: resource.TestMain 이 있는 패키지만 추림
      # (TestMain 없는 패키지는 -sweep 시 수용테스트가 그대로 돌기 때문에 제외)
      - name: Resolve sweep packages
        id: sweep_pkgs
        run: |
          PKGS=$(grep -rl 'resource.TestMain' ./samsungcloudplatform/service \
            | xargs -n1 dirname | sort -u | tr '\n' ' ')
          if [ -n "$PKGS" ]; then
            echo "found sweep packages: $PKGS"
            echo "list=$PKGS" >> "$GITHUB_OUTPUT"
          else
            echo "no resource.TestMain packages found"
            echo "list=" >> "$GITHUB_OUTPUT"
          fi

      - name: Sweep before tests
        if: steps.sweep_pkgs.outputs.list != ''
        run: go test ${{ steps.sweep_pkgs.outputs.list }} -v -sweep=${{ matrix.region }} -timeout 600m
        continue-on-error: true

      - name: Run acceptance tests
        id: run_tests
        run: |
          PKGS=$(go list ./samsungcloudplatform/service/... \
            | { grep -vE '/samsungcloudplatform/service/(virtualserver|servicewatch)(/|$)' || true; })
          if [ -z "$PKGS" ]; then
            echo "no packages to test after exclusions, skipping"
            exit 0
          fi
          echo "test packages:"
          echo "$PKGS"
          set +e
          go test $PKGS -v -json -cover -timeout 600m 2>&1 | tee test_result.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Sweep after tests
        if: always() && steps.sweep_pkgs.outputs.list != ''
        run: go test ${{ steps.sweep_pkgs.outputs.list }} -v -sweep=${{ matrix.region }} -timeout 600m
        continue-on-error: true

      - name: Parse test results
        if: always()
        id: parse
        env:
          TEST_RESULT_FILE: test_result.json
          MAIL_BODY_FILE: email.txt
          MAIL_FAILURE_FILE: test_failures.log
          SCP_TF_DEFAULT_REGION: ${{ matrix.region }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          export RUN_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ATTACHMENT=$(python3 .github/scripts/parse_test_result.py | grep '^attachment=' | cut -d= -f2)
          echo "attachment=${ATTACHMENT}" >> "$GITHUB_OUTPUT"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.region }}
          path: |
            test_result.json
            email.txt
            test_failures.log
          retention-days: 7

      - name: Print email attachment
        if: always()
        run: |
          ATTACHMENT="${{ steps.parse.outputs.attachment }}"
          if [ -f "$ATTACHMENT" ]; then
            echo "=== Mail attachment: $ATTACHMENT ==="
            cat "$ATTACHMENT"
          else
            echo "No attachment file found: $ATTACHMENT"
          fi

